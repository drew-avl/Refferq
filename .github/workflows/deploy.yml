name: Deploy
on:
  push:
    branches: [main]

concurrency:
  group: production-database-migrations
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Validate Prisma schema
        run: npx prisma validate
      - name: Require production database connection
        run: test -n "$DATABASE_URL"
      - name: Apply production database migrations
        run: npm run db:migrate:deploy
      - name: Verify database schema matches Prisma
        run: npx prisma migrate diff --from-schema-datasource prisma/schema.prisma --to-schema-datamodel prisma/schema.prisma --exit-code
      - name: Run tests
        run: npm test
      - name: Build application
        run: npm run build
