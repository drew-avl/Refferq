services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: referconnect-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://referconnect:referconnect@db:5432/referconnect
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string-min-32-chars}
      - SMTP_HOST=${SMTP_HOST:-smtp.office365.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - SMS_PROVIDER=${SMS_PROVIDER:-voipms}
      - ADMIN_SMS_NUMBERS=${ADMIN_SMS_NUMBERS:-}
      - VOIPMS_API_USERNAME=${VOIPMS_API_USERNAME:-}
      - VOIPMS_API_PASSWORD=${VOIPMS_API_PASSWORD:-}
      - VOIPMS_SMS_DID=${VOIPMS_SMS_DID:-}
      - THREECX_SMS_WEBHOOK_URL=${THREECX_SMS_WEBHOOK_URL:-}
      - THREECX_SMS_WEBHOOK_TOKEN=${THREECX_SMS_WEBHOOK_TOKEN:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - referconnect-network

  db:
    image: postgres:16-alpine
    container_name: referconnect-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=referconnect
      - POSTGRES_PASSWORD=referconnect
      - POSTGRES_DB=referconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - referconnect-network

volumes:
  postgres_data:

networks:
  referconnect-network:
    driver: bridge
