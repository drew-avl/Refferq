services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: referconnect-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://referconnect:referconnect@db:5432/referconnect
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-string-min-32-chars}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-ReferConnect <onboarding@resend.dev>}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - referconnect-network

  db:
    image: postgres:16-alpine
    container_name: referconnect-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=referconnect
      - POSTGRES_PASSWORD=referconnect
      - POSTGRES_DB=referconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - referconnect-network

volumes:
  postgres_data:

networks:
  referconnect-network:
    driver: bridge
